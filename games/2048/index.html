<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="header">
      <div class="title-row">
        <h1>2048</h1>
        <div class="scores">
          <div class="score-box">
            <span class="score-label">分数</span>
            <span id="score">0</span>
          </div>
          <div class="score-box">
            <span class="score-label">最高</span>
            <span id="best">0</span>
          </div>
        </div>
      </div>
      <div class="subtitle">合并数字，达到 <strong>2048</strong>！</div>
    </div>
    <div class="board" id="board"></div>
    <button class="new-game-btn" id="newGameBtn">🔄 新游戏</button>
    <div class="game-overlay" id="overlay">
      <div class="overlay-content">
        <h2 id="overlayTitle"></h2>
        <p id="overlayMsg"></p>
        <button id="continueBtn" style="display:none">继续游戏</button>
        <button id="retryBtn">再来一局</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
