<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>飞翔的小鸟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <canvas id="canvas"></canvas>
    <div class="game-overlay" id="overlay">
      <div class="overlay-content">
        <h2 id="overlayTitle">🐦 飞翔的小鸟</h2>
        <p id="overlayMsg">点击屏幕让小鸟起飞</p>
        <p id="overlayScore" style="display:none; font-size: 1.2rem; font-weight: 700;"></p>
        <div class="medal" id="medal" style="display:none"></div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
